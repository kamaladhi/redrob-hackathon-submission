methodology_summary: |
  We utilized an offline pre-computation pipeline to generate dense vector embeddings for all candidates using the `all-MiniLM-L6-v2` transformer model and built a highly optimized FAISS index. During the 5-minute ranking step, our system performs a lightning-fast semantic similarity search against the Job Description embedding. This base score is then modulated by a hybrid scoring algorithm that heavily penalizes irrelevant job titles, dynamically scales scores based on `redrob_signals` (recruiter response rate, notice period), and matches hard keyword constraints. Reasoning is generated using a deterministic factual templating system to eliminate LLM hallucination and ensure runtime fits within the CPU budget.
